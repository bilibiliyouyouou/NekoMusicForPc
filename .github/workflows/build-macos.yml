name: Build macOS PKG (universal arm64+x86_64)

'on':
  workflow_dispatch:
    inputs:
      reason:
        description: "手动触发原因（可选）"
        required: false
        default: "manual"
        type: string
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: write
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          modules: 'qtmultimedia'

      - name: Build and package (universal .pkg)
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          chmod +x build_macos.sh
          ./build_macos.sh Release

      - name: Show pkg info (sanity)
        run: |
          set -euo pipefail
          PKG="$(find "$GITHUB_WORKSPACE/dist" -name 'Neko云音乐-*-macos-universal.pkg' -type f | head -n1 || true)"
          if [[ -z "$PKG" ]]; then
            echo "No pkg found in dist/"
            ls -la "$GITHUB_WORKSPACE/dist" || true
            exit 1
          fi
          echo "PKG=$PKG" >> "$GITHUB_ENV"
          ls -lh "$PKG"
          lipo -info "$GITHUB_WORKSPACE/build-macos/install/NekoMusic.app/Contents/MacOS/NekoMusic" || true

      - name: Upload PKG artifact
        if: env.PKG != ''
        uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: ${{ env.PKG }}

      - name: Upload release asset (on tag)
        if: startsWith(github.ref, 'refs/tags/') && env.PKG != ''
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PKG }}
