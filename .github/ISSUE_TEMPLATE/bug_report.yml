name: 缺陷报告（Bug）
description: 崩溃、无法播放、网易云导入失败等异常（请尽量填全，便于复现）
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请**勿**在 Issue 中粘贴明文密码、完整 Token；日志与配置可打码后再发。  
        本仓库 **main** 为 **Qt 6 + C++** 客户端；旧版 Electron 在分支 **`old`**。

  - type: textarea
    id: summary
    attributes:
      label: 问题简述
      description: 用一两句话说明「发生了什么」。
      placeholder: 例：导入网易云歌单后闪退；Linux 下无声音……
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 按顺序写操作步骤，越具体越好。
      placeholder: |
        1. 打开 …
        2. 点击 …
        3. …
    validations:
      required: true

  - type: textarea
    id: expected_actual
    attributes:
      label: 期望行为 vs 实际行为
      description: 分别写「应该怎样」和「实际怎样」。
      placeholder: |
        期望：……
        实际：……
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - Windows
        - Linux
        - macOS
        - 其他（请在「其他说明」里写明）
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: PC 客户端版本或 commit
      description: Release 号，或终端执行 `git rev-parse --short HEAD`。
      placeholder: 例：1.0.0 / abc1234
    validations:
      required: true

  - type: input
    id: qt_version
    attributes:
      label: Qt 版本（若知晓）
      placeholder: 例：6.8.1
    validations:
      required: false

  - type: dropdown
    id: build_method
    attributes:
      label: 构建 / 获取方式
      options:
        - 官方 Release 安装包
        - 本地 CMake / 脚本自编译（如 build_linux.sh）
        - CI 产物 / 其他（请说明）
    validations:
      required: true

  - type: dropdown
    id: api_backend
    attributes:
      label: 连接的后端 / API
      options:
        - 官方 music.cnmsb.xin（或默认未改）
        - 自建 / 第三方（域名可打码）
        - 不确定
    validations:
      required: true

  - type: dropdown
    id: netease_related
    attributes:
      label: 是否与「网易云歌单导入」相关？
      options:
        - 无关
        - 有关（请在下方「日志或截图说明」或「其他说明」里写歌单 ID / 现象）
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志或截图说明
      description: 控制台输出、Qt 相关日志；截图可传图床后贴链接。
      placeholder: 在此粘贴（已打码）……
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: 其他说明（可选）
      description: 如 Wayland、代理、HiDPI、仅某发行版等。
    validations:
      required: false
